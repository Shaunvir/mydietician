<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Dietitian - MyDietitian</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-container {
            background: white;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.06);
            max-width: 480px;
            width: 100%;
            margin: 20px;
        }

        .search-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .search-title {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .search-subtitle {
            color: #6366f1;
            font-weight: 600;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: white;
            color: #374151;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-select {
            width: 100%;
            padding: 16px 50px 16px 50px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s ease;
            background: white;
            color: #374151;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 16px center;
            background-repeat: no-repeat;
            background-size: 16px;
        }

        .form-select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-button {
            width: 100%;
            background: #6366f1;
            color: white;
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-top: 32px;
        }

        .search-button:hover {
            background: #5048e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
        }

        .search-button:active {
            transform: translateY(0);
        }

        .search-icon {
            font-size: 20px;
        }

        /* Back link */
        .back-link {
            position: absolute;
            top: 24px;
            left: 24px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #374151;
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            .search-container {
                padding: 32px 24px;
                margin: 16px;
                border-radius: 16px;
            }

            .search-title {
                font-size: 24px;
            }

            .form-input,
            .form-select {
                padding: 14px 14px 14px 46px;
                font-size: 15px;
            }

            .search-button {
                padding: 16px 20px;
                font-size: 15px;
            }

            .back-link {
                position: static;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Home</a>
    
    <div class="search-container">
        <div class="search-header">
            <h1 class="search-title">Find a dietitian</h1>
            <p class="search-subtitle">covered by insurance</p>
        </div>

        <form id="searchForm" action="results.html" method="GET">
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="input-icon">📍</span>
                    <select class="form-select" name="location" id="location" required>
                        <option value="">City, province, or postal code*</option>
                        <option value="Toronto">Toronto, ON</option>
                        <option value="Vancouver">Vancouver, BC</option>
                        <option value="Montreal">Montreal, QC</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <span class="input-icon">🏥</span>
                    <select class="form-select" name="insurance" id="insurance" required>
                        <option value="">Insurance*</option>
                        <option value="Canada Life">Canada Life</option>
                        <option value="Sun Life Financial">Sun Life Financial</option>
                        <option value="Manulife">Manulife</option>
                        <option value="Great-West Life">Great-West Life</option>
                        <option value="Blue Cross">Blue Cross</option>
                        <option value="Chambers of Commerce Group Insurance">Chambers of Commerce Group Insurance</option>
                        <option value="Desjardins Insurance">Desjardins Insurance</option>
                        <option value="Industrial Alliance">Industrial Alliance</option>
                        <option value="Medavie Blue Cross">Medavie Blue Cross</option>
                        <option value="GroupHEALTH">GroupHEALTH</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <span class="input-icon">⭐</span>
                    <select class="form-select" name="specialty" id="specialty">
                        <option value="">Specialties</option>
                        <option value="Weight Management">Weight Management</option>
                        <option value="Diabetes Management">Diabetes Management</option>
                        <option value="Heart Health">Heart Health</option>
                        <option value="Gut Health">Gut Health</option>
                        <option value="Sports Nutrition">Sports Nutrition</option>
                        <option value="Eating Disorders">Eating Disorders</option>
                        <option value="Pregnancy & Postpartum">Pregnancy & Postpartum</option>
                        <option value="Pediatric Nutrition">Pediatric Nutrition</option>
                        <option value="Food Allergies & Sensitivities">Food Allergies & Sensitivities</option>
                        <option value="General Nutrition">General Nutrition</option>
                        <option value="Autoimmune Conditions">Autoimmune Conditions</option>
                        <option value="Cancer Nutrition">Cancer Nutrition</option>
                        <option value="PCOS">PCOS</option>
                        <option value="Menopause">Menopause</option>
                        <option value="High Blood Pressure">High Blood Pressure</option>
                        <option value="High Cholesterol">High Cholesterol</option>
                        <option value="Kidney Disease">Kidney Disease</option>
                        <option value="Transplant Nutrition">Transplant Nutrition</option>
                        <option value="Vegan & Vegetarian">Vegan & Vegetarian</option>
                        <option value="Oral Health">Oral Health</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="search-button">
                <span class="search-icon">🔍</span>
                Search
            </button>
        </form>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const params = new URLSearchParams();
            
            // Add form data to URL parameters
            for (let [key, value] of formData.entries()) {
                if (value) {
                    params.append(key, value);
                }
            }
            
            // Redirect to results page with search parameters
            window.location.href = 'results.html?' + params.toString();
        });

        // Basic form validation for dropdown
        document.getElementById('location').addEventListener('change', function() {
            if (this.value) {
                this.style.borderColor = '#6366f1';
            }
        });
    </script>
</body>
</html>
